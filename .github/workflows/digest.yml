# The "robot" that builds your digest every morning — in GitHub's cloud,
# so it runs whether your Mac is on or off.
name: Daily digest

on:
  schedule:
    # Times are UTC, and deliberately OFF the top of the hour (GitHub delays or
    # drops on-the-hour schedules under load). Two early attempts give resilience;
    # both finish before noon Central Europe (noon CEST = 10:00 UTC).
    #   05:23 UTC ≈ 07:23 CEST  (primary)
    #   08:17 UTC ≈ 10:17 CEST  (backup — auto-skips if the digest already ran today)
    - cron: "23 5 * * *"
    - cron: "17 8 * * *"
  workflow_dispatch:        # adds a "Run workflow" button so you can run it on demand

permissions:
  contents: write           # let the robot save the new digest back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v6

      # Don't rebuild if today's digest already exists (lets the backup time be a
      # safety net without doubling cost). A manual run always forces a rebuild.
      - name: Decide whether to run
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — building."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -f "data/digest-$(date -u +%F).json" ]; then
            echo "Today's digest already exists — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Build the digest
        if: steps.check.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Save the new digest back to the repo
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data site
          git commit -m "Daily digest $(date -u +%Y-%m-%d)" || echo "No changes today."
          git push

      - name: Publish to igesser.com/news
        if: steps.check.outputs.run == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone git@github.com:igesser/igesser.github.io.git site-repo
          mkdir -p site-repo/news
          cp site/index.html site-repo/news/index.html
          cd site-repo
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news/index.html
          git commit -m "Update /news $(date -u +%Y-%m-%d)" || echo "no change"
          git push
